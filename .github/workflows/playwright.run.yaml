name: Playwright & Allure Reports

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install Allure Commandline
      - name: Install Allure Commandline
        run: npm install -g allure-commandline --save-dev

      # 5️⃣ Install Playwright Browsers
      - name: Install Playwright Browsers
        run: npx playwright install chromium chrome msedge firefox webkit --with-deps

      # 6️⃣ Run Playwright Tests
      - name: Run Playwright Tests
        run: npx playwright test tests/Loginpage.spec.ts --config=playwright.config.ts

      # 7️⃣ Generate Allure HTML Report
      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ]; then
            allure generate allure-results --clean -o allure-report
          else
            echo "Allure results folder missing, skipping report generation."
          fi

      # 8️⃣ Verify reports exist
      - name: Verify generated reports
        if: always()
        run: |
          echo "Allure report contents:"
          ls -R allure-report || echo "Allure report not found"

          echo "Playwright built-in report contents:"
          ls -R playwright-report || echo "Playwright report not found"

      # 9️⃣ Upload Allure Report
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: ignore

      # 🔟 Upload Playwright Report
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  publish-reports:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Download Allure Report
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report

      # 3️⃣ Download Playwright Report
      - name: Download Playwright Report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      # 4️⃣ Verify downloaded reports
      - name: Verify reports
        run: |
          echo "Allure report contents:"
          ls -R allure-report || echo "Allure report not available"

          echo "Playwright report contents:"
          ls -R playwright-report || echo "Playwright report not available"

      # 5️⃣ Prepare reports for GitHub Pages
      - name: Prepare reports for deployment
        run: |
          mkdir -p gh-pages-deploy

          [ -d "allure-report" ] && cp -r allure-report gh-pages-deploy/

          [ -d "playwright-report" ] && cp -r playwright-report gh-pages-deploy/

          echo "Combined reports directory contents:"
          ls -R gh-pages-deploy

      # 6️⃣ Publish Reports to GitHub Pages
      - name: Publish Reports to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-deploy
          force_orphan: true

      # 7️⃣ Print final URLs
      - name: Report URLs
        run: |
          echo "Reports Published!"
          echo "Allure Report:"
          echo "https://saumya06july.github.io/PlayWright_Framework/allure-report/"

          echo "Playwright HTML Report:"
          echo "https://saumya06july.github.io/PlayWright_Framework/playwright-report/"